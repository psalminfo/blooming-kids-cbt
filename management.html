    <style>
        :root{--sidebar-width:280px;--sidebar-collapsed:70px;--header-height:70px;--primary-color:#10b981;--primary-dark:#059669;--secondary-color:#3b82f6;--danger-color:#ef4444;--warning-color:#f59e0b;--info-color:#8b5cf6;--light-bg:#f9fafb;--bg-page:#f9fafb;--bg-surface:#fff;--bg-surface-2:#f3f4f6;--bg-surface-3:#e5e7eb;--border-color:#e5e7eb;--text-primary:#111827;--text-secondary:#374151;--text-muted:#6b7280;--text-faint:#9ca3af;--input-border:#d1d5db;--input-bg:#fff;--nav-active-bg:#d1fae5;--nav-active-text:#059669;--nav-hover-bg:#f3f4f6;--header-bg:#fff;--sidebar-bg:#fff;--card-shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);--elevated-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06);}[data-theme=dark]{--bg-page:#0f172a;--bg-surface:#1e293b;--bg-surface-2:#273449;--bg-surface-3:#334155;--border-color:#334155;--text-primary:#f1f5f9;--text-secondary:#cbd5e1;--text-muted:#94a3b8;--text-faint:#64748b;--input-border:#475569;--input-bg:#1e293b;--nav-active-bg:#064e3b;--nav-active-text:#34d399;--nav-hover-bg:#273449;--header-bg:#1e293b;--sidebar-bg:#1e293b;--light-bg:#0f172a;--card-shadow:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);--elevated-shadow:0 4px 6px -1px rgba(0,0,0,.4),0 2px 4px -1px rgba(0,0,0,.3);}
        body { margin:0; padding:0; min-height:100vh; background-color:var(--light-bg); display:grid; grid-template-columns:var(--sidebar-width) 1fr; grid-template-rows:var(--header-height) 1fr; grid-template-areas:"sidebar header" "sidebar main"; transition:grid-template-columns .3s ease; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }

        .sidebar-header { padding:1.5rem; border-bottom:1px solid #e5e7eb; min-height:var(--header-height); display:flex; align-items:center; justify-content:space-between; }

        .notification-btn:hover,.user-menu-btn:hover { background-color:#f3f4f6; }

        .main-content { grid-area:main; padding:1.5rem; overflow-y:auto; min-height:calc(100vh - var(--header-height)); }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:1.5rem; margin-bottom:2rem; }

        .content-card { background:white; border-radius:.75rem; border:1px solid #e5e7eb; box-shadow:var(--card-shadow); padding:1.5rem; margin-bottom:1.5rem; }
        .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem; }
        .card-title { font-size:1.25rem; font-weight:700; color:#111827; margin:0; }
        .card-actions { display:flex; gap:.75rem; flex-wrap:wrap; }
        .btn { padding:.625rem 1.25rem; border-radius:.5rem; font-size:.875rem; font-weight:500; cursor:pointer; transition:all .2s; border:none; display:inline-flex; align-items:center; gap:.5rem; }
        .btn-primary { background-color:var(--primary-color); color:white; }
        .btn-primary:hover { background-color:var(--primary-dark); }
        .btn-secondary { background-color:white; color:#374151; border:1px solid #d1d5db; }
        .btn-secondary:hover { background-color:#f9fafb; }
        .btn-icon { padding:.5rem; min-width:40px; justify-content:center; }
        .search-input,.select-input { padding:.625rem .875rem; border:1px solid #d1d5db; border-radius:.5rem; font-size:.875rem; transition:all .2s; }
        .search-input:focus,.select-input:focus { outline:none; border-color:var(--primary-color); box-shadow:0 0 0 3px rgba(16,185,129,.2); }
        @media (max-width:1024px) { :root{--sidebar-width:250px;} .stats-grid{grid-template-columns:repeat(2,1fr);} .card-header{flex-direction:column;align-items:flex-start;} .card-actions{width:100%;justify-content:flex-start;} }
        @media (max-width:768px) { body{grid-template-columns:1fr;grid-template-rows:var(--header-height) 1fr;grid-template-areas:"header" "main";} .sidebar{position:fixed;left:-100%;width:280px;transition:left .3s ease;z-index:1000;} .sidebar.mobile-open{left:0;} body.sidebar-collapsed .sidebar{left:-100%;} .sidebar.mobile-open~.header,.sidebar.mobile-open~.main-content{filter:blur(2px);pointer-events:none;} .stats-grid{grid-template-columns:1fr;} .header{padding:0 1rem;} .main-content{padding:1rem;} .mobile-menu-btn{display:block !important;} .mobile-menu-btn.hidden{display:none !important;} }
        @media (max-width:480px) { :root{--header-height:60px;} .btn{padding:.5rem .75rem;font-size:.75rem;} .content-card{padding:1rem;} .search-input,.select-input{width:100%;margin-bottom:.5rem;} .header-actions{gap:.5rem;} }

        @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }

        </div>
        <div class="header-actions">

            <div class="loading-spinner mx-auto"></div>
            <p class="text-emerald-600 font-semibold mt-4">Loading dashboard...</p>
        </div>
